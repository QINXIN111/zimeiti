<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 自媒体助手</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="app">
        <!-- 顶部导航 -->
        <header class="header">
            <div class="header-left">
                <h1>🚀 自媒体助手</h1>
                <span class="subtitle">AI 写作 · 多平台分发</span>
            </div>
            <div class="header-right">
                <button class="icon-btn" onclick="openSettings()">⚙️ 设置</button>
                <div id="platformStatus" class="platform-status"></div>
            </div>
        </header>

        <!-- 主内容 -->
        <main class="main">
            <!-- 左侧：创作面板 -->
            <section class="panel">
                <div class="card">
                    <h2>📝 新建发布任务</h2>
                    <div class="form-group">
                        <label>文章主题</label>
                        <textarea id="topicInput" placeholder="输入你想写的内容主题，例如：&#10;2024年最值得入手的5款机械键盘推荐"></textarea>
                    </div>
                    <div class="form-group">
                        <label>目标平台</label>
                        <div class="platform-selector">
                            <label class="platform-tag" data-platform="xiaohongshu">
                                <input type="checkbox" value="xiaohongshu" checked> 📕 小红书
                            </label>
                            <label class="platform-tag" data-platform="douyin">
                                <input type="checkbox" value="douyin" checked> 🎵 抖音
                            </label>
                            <label class="platform-tag" data-platform="wechat">
                                <input type="checkbox" value="wechat" checked> 💚 公众号
                            </label>
                        </div>
                    </div>
                    <div class="form-actions">
                        <button id="publishBtn" class="btn btn-primary" onclick="startTask()">
                            🚀 开始生成
                        </button>
                        <label class="auto-toggle">
                            <input type="checkbox" id="autoPublish"> 跳过审核直接发布
                        </label>
                    </div>
                </div>

                <!-- 实时日志 -->
                <div class="card">
                    <h2>📋 执行日志</h2>
                    <div id="logArea" class="log-area">
                        <div class="log-item log-info">系统就绪，等待任务...</div>
                    </div>
                </div>
            </section>

            <!-- 右侧：任务列表 -->
            <section class="panel">
                <div class="card">
                    <h2>📊 任务历史</h2>
                    <div id="taskList" class="task-list">
                        <div class="empty-state">暂无任务</div>
                    </div>
                </div>
            </section>
        </main>

        <!-- 审核弹窗 -->
        <div id="reviewModal" class="modal hidden">
            <div class="modal-overlay" onclick="closeModal()"></div>
            <div class="modal-content">
                <div class="modal-header">
                    <h2>👀 内容审核</h2>
                    <button class="close-btn" onclick="closeModal()">✕</button>
                </div>
                <div id="reviewBody" class="modal-body"></div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" onclick="closeModal()">取消</button>
                    <button class="btn btn-primary" onclick="approvePublish()">✅ 确认发布</button>
                </div>
            </div>
        </div>

        <!-- 设置弹窗 -->
        <div id="settingsModal" class="modal hidden">
            <div class="modal-overlay" onclick="closeSettings()"></div>
            <div class="modal-content settings-modal">
                <div class="modal-header">
                    <h2>⚙️ 系统设置</h2>
                    <button class="close-btn" onclick="closeSettings()">✕</button>
                </div>
                <div class="settings-tabs">
                    <button class="tab-btn active" data-tab="ai" onclick="switchTab('ai')">AI 配置</button>
                    <button class="tab-btn" data-tab="platform" onclick="switchTab('platform')">平台账号</button>
                    <button class="tab-btn" data-tab="publish" onclick="switchTab('publish')">发布策略</button>
                </div>
                <div class="modal-body settings-body">
                    <!-- AI 配置 -->
                    <div id="tab-ai" class="tab-content active">
                        <div class="form-group">
                            <label>AI 提供商</label>
                            <select id="aiProvider" class="form-input">
                                <option value="openai">OpenAI</option>
                                <option value="deepseek">DeepSeek</option>
                                <option value="qwen">通义千问 (Qwen)</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>API Key</label>
                            <input type="password" id="aiApiKey" class="form-input" placeholder="sk-...">
                        </div>
                        <div class="form-group">
                            <label>Base URL</label>
                            <input type="text" id="aiBaseUrl" class="form-input" placeholder="https://api.openai.com/v1">
                        </div>
                        <div class="form-group">
                            <label>Model</label>
                            <input type="text" id="aiModel" class="form-input" placeholder="gpt-4o">
                        </div>
                        <div class="form-group">
                            <label>Temperature</label>
                            <input type="number" id="aiTemperature" class="form-input" min="0" max="2" step="0.1" value="0.7">
                        </div>
                    </div>

                    <!-- 平台账号 -->
                    <div id="tab-platform" class="tab-content">
                        <div class="platform-card">
                            <h3>📕 小红书</h3>
                            <div id="platform-xiaohongshu-status" class="platform-login-status">未登录</div>
                            <button class="btn btn-primary" onclick="loginPlatform('xiaohongshu')">🔐 扫码登录</button>
                        </div>
                        <div class="platform-card">
                            <h3>🎵 抖音</h3>
                            <div id="platform-douyin-status" class="platform-login-status">未登录</div>
                            <button class="btn btn-primary" onclick="loginPlatform('douyin')">🔐 扫码登录</button>
                        </div>
                        <div class="platform-card">
                            <h3>💚 微信公众号</h3>
                            <div id="platform-wechat-status" class="platform-login-status">未登录</div>
                            <button class="btn btn-primary" onclick="loginPlatform('wechat')">🔐 扫码登录</button>
                        </div>
                    </div>

                    <!-- 发布策略 -->
                    <div id="tab-publish" class="tab-content">
                        <div class="form-group">
                            <label>
                                <input type="checkbox" id="reviewBeforePublish" checked>
                                发布前人工审核
                            </label>
                        </div>
                        <div class="form-group">
                            <label>每日最大发布数</label>
                            <input type="number" id="maxDailyPosts" class="form-input" min="1" max="50" value="3">
                        </div>
                        <div class="form-group">
                            <label>发布间隔（分钟）</label>
                            <input type="number" id="intervalMinutes" class="form-input" min="1" max="1440" value="60">
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" onclick="closeSettings()">取消</button>
                    <button class="btn btn-primary" onclick="saveSettings()">💾 保存配置</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
